
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solana SRL | Monitor de Producción</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://media.licdn.com/dms/image/v2/C4E0BAQENkX0orEV8KQ/company-logo_200_200/company-logo_200_200/0/1630620084700?e=2147483647&v=beta&t=8OGYSccaJ78FnSmrdWKlTs0G_EYREXv8gvSJoIaL-DQ">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root {
            --primary: #64748b; /* Slate 500 */
            --accent: #0d9488;  /* Teal 600 */
            --bg-main: #f8fafc; /* Slate 50 */
            --sidebar-bg: #334155; /* Slate 700 - Menos oscuro que el anterior */
            --text-dark: #1e293b; /* Slate 800 */
        }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg-main);
            color: var(--text-dark);
            margin: 0;
            overflow: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 12px -2px rgba(0, 0, 0, 0.03);
        }

        .sidebar-theme {
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { 
            background: #cbd5e1; 
            border-radius: 10px; 
        }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.9; }
        }
        .pulse-led { animation: pulse-soft 2s infinite ease-in-out; }

        .row-card-hover {
            transition: all 0.2s ease-out;
        }
        .row-card-hover:hover {
            background: #ffffff !important;
            box-shadow: 0 12px 24px -8px rgba(0, 0, 0, 0.08);
            border-color: var(--accent) !important;
            transform: translateY(-1px) translateX(2px);
        }

        .recharts-cartesian-axis-tick-value {
            font-size: 10px;
            font-weight: 700;
            fill: #94a3b8;
        }
    </style>
</head>
<body class="antialiased">
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
</body>
</html>
